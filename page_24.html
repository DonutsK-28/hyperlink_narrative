<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Overrides | Critical Web Design</title>

    <!-- font links -->
    <link rel="stylesheet" href="./assets/css/styles.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Aboreto&display=swap" 
	rel="stylesheet">

    <!-- import bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- override bootstrap styles *after* importing above -->
    <style>
    .root {
        --charcoal-blue: #233d4dff;
	    --pumpkin-spice: #fe7f2dff;
	    --golden-pollen: #fcca46ff;
	    --muted-olive: #a1c181ff;
	    --seagrass: #619b8aff;
    }
    body {
        background-color: rgb(9, 37, 53);
        margin-inline: 2%;
    }
    .blue-box {
        color: #fe7f2dff;
        font-size: 150%;
    }
    .orange-box {
        color: #fe7f2dff;
        font-family: Aboreto;
        font-size: 145%;
    }
    .pink-box {
        color: #fcca46ff;
        font-size: 150%; 
    }
    .custom-row {
      padding-top: 5px;   /* default is ~15px */
      padding-bottom: 5px;
    }
    a {
        text-decoration: none;
        color: #619b8aff;
        font-family: Aboreto;
    }
    .italic {
        font-family: Aboreto;
        font-style: italic;
        color: #fcca46ff;
    }
    .img-fluid {
        width: 80%;
    }
    </style>
</head>
<body>

    <div class="container">

        <div class="row mt-5">
            <div class="col-md-6 col-lg-5 blue-box d-flex 
            justify-content-center align-items-center">
                <img src="assets/img/Blue_morpho.jpg" alt="swallowtail" class="img-fluid">
            </div>
            <div class="col-md-6 col-lg-7 text-center orange-box d-flex 
            justify-content-center align-items-center mt-5">
                <span class="italic">★ Blue Morpho ★</span>
            </div>
        </div>

        <div class="row">
            <div class="col text-center orange-box d-flex 
            justify-content-center align-items-center mt-5">
               ★ The vibrant blue brings calm and peace, while also standing as a symbol of mourning
            </div>
        </div>

        <div class="row">
            <div class="col text-center orange-box d-flex 
            justify-content-center align-items-center mt-5">
               ★ Stands as a reminder of the beauty in life, and the beauty within 
            </div>
        </div>

         <div class="row">
            <div class="col text-center orange-box d-flex 
            justify-content-center align-items-center mt-5">
               ★ Dreaming of one can often mean a big change is coming, or that one needs to search for peace
            </div>
        </div>

        <div class="row mt-5">
            <div class="col text-center pink-box d-flex 
            justify-content-center align-items-center">
                <button type="button" class="btn btn-outline-warning">
                    <a href="page_22.html">Butterflies</a>
                </button> 
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</body>
</html>
